<script type="text/javascript">
    RED.nodes.registerType('signalbox', {
        category: 'function',
        color: '#c7a35a',
        defaults: {
            name: { value: "" },
            colorThresholds: { value: true },
            warnAfter: { value: 5, validate: RED.validators.number() },
            warnAfterUnit: { value: "m" },
            errorAfter: { value: 30, validate: RED.validators.number() },
            errorAfterUnit: { value: "m" },
            updateInterval: { value: 5, validate: RED.validators.number() },
            updateIntervalUnit: { value: "s" },
            trackTopPayloads: { value: true },
            topPayloadsResetEvery: { value: 1, validate: RED.validators.number() },
            topPayloadsResetEveryUnit: { value: "d" },
            group: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-train",
        label: function () {
            return this.name || "signalbox";
        },
        labelStyle: function () {
            return this.name ? "node_label_italic" : "";
        },
        oneditprepare: function () {
            function toggleThresholdRows() {
                $('#signalbox-threshold-rows').toggle($('#node-input-colorThresholds').is(':checked'));
            }
            function toggleTopPayloadRows() {
                $('#signalbox-toppayload-rows').toggle($('#node-input-trackTopPayloads').is(':checked'));
            }
            $('#node-input-colorThresholds').on('change', toggleThresholdRows);
            $('#node-input-trackTopPayloads').on('change', toggleTopPayloadRows);
            toggleThresholdRows();
            toggleTopPayloadRows();
        },
        oneditsave: function () {
            const u = { ms: 1, s: 1000, m: 60000, h: 3600000, d: 86400000 };
            const warnMs = Number($('#node-input-warnAfter').val()) * u[$('#node-input-warnAfterUnit').val()];
            const errMs = Number($('#node-input-errorAfter').val()) * u[$('#node-input-errorAfterUnit').val()];
            if ($('#node-input-colorThresholds').is(':checked') && errMs > 0 && warnMs > 0 && errMs <= warnMs) {
                RED.notify("'Error after' should be longer than 'Warn after'", { type: "warning", timeout: 4000 });
            }
        }
    });
</script>

    <div class="form-row">

            <label for="node-input-errorAfter"><i class="fa fa-times-circle" style="color:#c00"></i> Error after</label>

            <select id="node-input-errorAfterUnit" style="width:100px">

                <option value="s">seconds</option>
                <option value="m">minutes</option>
                <option value="h">hours</option>
                <option value="d">days</option>
            </select>
        </div>
    </div>

    <hr/>

    <div class="form-row">
        <label for="node-input-trackTopPayloads" style="width:auto; display:inline">
            <input type="checkbox" id="node-input-trackTopPayloads" style="display:inline-block; width:15px; vertical-align:baseline;">
            <span>Track top 10 payloads by frequency</span>
        </label>
    </div>
    <div id="signalbox-toppayload-rows">
        <div class="form-row">
            <label for="node-input-topPayloadsResetEvery"><i class="fa fa-undo"></i> Reset tally every</label>
            <input type="number" id="node-input-topPayloadsResetEvery" style="width:70px" min="0" step="any">
            <select id="node-input-topPayloadsResetEveryUnit" style="width:100px">
                <option value="ms">ms</option>
                <option value="s">seconds</option>
                <option value="m">minutes</option>
                <option value="h">hours</option>
                <option value="d">days</option>
            </select>
        </div>
    </div>
</script>

<script type="text/x-red" data-help-name="signalbox">
    <p>Passes messages through completely unchanged. Its job is to watch the
    traffic going past - like a signalman logging every train - and keep
    stats on it, visible in its status badge and in context.</p>
    <p>Drop it inline anywhere in a flow - nothing needs to be configured to
    use it. Give it a <b>Name</b> to identify it inside its group's combined
    stats; otherwise it uses an auto-generated one.</p>

    <h3>Status badge</h3>
    <p>Shows a compact live summary, e.g. <code>3s ago · 12/hr · 340/day</code>,
    updating on the <b>Update every</b> interval - independent of how often
    messages actually arrive.</p>
    <ul>
        <li><b>Green</b> - fresher than <code>Warn after</code></li>
        <li><b>Yellow</b> - between <code>Warn after</code> and <code>Error after</code></li>
        <li><b>Red</b> - older than <code>Error after</code></li>
    </ul>
    <p>Untick <b>Change status color as it gets stale</b> for a neutral blue
    dot with text only.</p>

    <h3>Node context: <code>signalbox</code></h3>
    <p>Each instance writes a full snapshot to its own node context under
    the key <code>signalbox</code>, containing hour/day/week/total counts,
    the rolling average interval between messages, and (if enabled) the
    top 10 payloads seen recently by frequency.</p>

    <h3>Global context: combined group stats</h3>
    <p>Every signalbox with the same <b>Group</b> combines into one shared
    aggregate under <code>global['signalbox-&lt;group&gt;']</code> - or just
    <code>global.signalbox</code> if <b>Group</b> is left blank. The combined
    object contains:</p>
    <ul>
        <li><code>counts</code> - hour/day/week/total summed across every
        member of the group</li>
        <li><code>busiest</code> - which member had the most traffic today</li>
        <li><code>topPayloads</code> - a merged top 10 across every member
        (if enabled)</li>
        <li><code>members</code> - each member's own individual snapshot,
        keyed by node ID, for drilling in further</li>
    </ul>
    <p>From a Function node:</p>
    <pre>const cameras = global.get("signalbox-cameras");
console.log(cameras.busiest, cameras.counts.day, cameras.topPayloads);</pre>
    <p>Members that stop reporting (deleted, or moved to a different group)
    drop out of the aggregate automatically after a few minutes.</p>

    <h3>Top payload tracking</h3>
    <p>The frequency tally resets on the <b>Reset tally every</b> interval
    rather than tracking a true sliding window, and is capped at 500
    distinct values (least-frequent evicted first) to keep memory bounded
    if it's pointed at high-cardinality payloads (e.g. constantly-changing
    sensor readings). Works best for payloads with a naturally small set
    of repeating values - status strings, event names, error codes, and
    similar.</p>
</script>
